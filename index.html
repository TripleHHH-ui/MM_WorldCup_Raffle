/* ============================================================
   RAILWAY ENGINE (PUSH & PULL SYNCHRONIZATION)
   ============================================================ */
async function pullFromRailway() {
  setPollDot(true);
  try {
    const response = await fetch(RAILWAY_URL);
    if (!response.ok) throw new Error("Server communication health check failed");
    
    const serverData = await response.json();
    
    // Simple state discrepancy checker
    if (JSON.stringify(state.draws) !== JSON.stringify(serverData.draws) || state.locked !== serverData.locked) {
      state.draws = serverData.draws || [];
      state.locked = !!serverData.locked;
      saveLocal();
      renderAll();
      initWheel();
    }
    
    setConnBadge('live', '<div id="conn-dot"></div> Connected to Railway');
    setSaveStatus('', '');
  } catch (err) {
    console.error("Railway Sync Sync Error:", err);
    setConnBadge('offline', '<div id="conn-dot"></div> Connection Error');
    setSaveStatus('pending', '⚠️ Cloud connection disconnected. retrying...');
  } finally {
    setTimeout(() => setPollDot(false), 400);
  }
}

async function pushToRailway() {
  setSaveStatus('saving', '<i class="fa fa-spinner fa-spin"></i> Syncing changes to cloud database...');
  try {
    const response = await fetch(RAILWAY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state)
    });
    if (!response.ok) throw new Error("Data submission rejected by API route");
    setSaveStatus('saved', '<i class="fa fa-check"></i> Changes securely saved to Railway database.');
  } catch (err) {
    console.error("Railway push failure:", err);
    setSaveStatus('pending', '❌ Failed to stream update. Retrying sequence...');
  }
}

function startPolling() {
  pullFromRailway();
  setInterval(pullFromRailway, POLL_INTERVAL);
}

/* ============================================================
   LOCAL STORAGE EMULATION BACKUP
   ============================================================ */
function loadLocal() {
  try {
    var raw = localStorage.getItem(LS_KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      state.draws = parsed.draws || [];
      state.locked = !!parsed.locked;
    }
  } catch(e) { console.error(e); }
}

function saveLocal() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e) {}
}

/* ============================================================
   CLEANED UI & DRAW ACTIONS (Hooked into Railway)
   ============================================================ */
function startSpin() {
  if (state.locked) { alert("Draw is currently locked."); return; }
  var input = document.getElementById('nickname-input');
  var name = input.value.trim();
  if (!name) return;

  // Sync state first to minimize ticket concurrency clashes
  pullFromRailway().then(() => {
    if (state.locked) { alert("The admin locked the draw session."); return; }
    if (hasUserDrawn(name)) { alert("This user profile has already executed a roll!"); return; }

    var available = getAvailableTeams();
    if (available.length === 0) { alert("The raffle wheel is empty!"); return; }

    disableInputGroup(true);
    var targetTeam = available[Math.floor(Math.random() * available.length)];
    
    // Execute wheel physics spin animation triggers...
    animateWheelToTarget(targetTeam, name);
  });
}

function finalizeDrawRecord(name, teamObj) {
  state.draws.push({ nickname: name, team: teamObj.name, conf: teamObj.conf, timestamp: new Date().toISOString() });
  saveLocal();
  renderAll();
  initWheel();
  pushToRailway(); // Stream right up to Railway SQL
}

/* ============================================================
   ADMIN ACTIONS INTERACTION LAYER
   ============================================================ */
function adminToggleLock() {
  if (!adminUnlocked) return;
  state.locked = !state.locked;
  saveLocal();
  renderAll();
  pushToRailway().then(updateAdminPanelUI);
}

function adminRemoveEntry() {
  if (!adminUnlocked) return;
  var select = document.getElementById('remove-select');
  var idx = parseInt(select.value, 10);
  if (isNaN(idx) || idx < 0 || idx >= state.draws.length) return;
  
  state.draws.splice(idx, 1);
  saveLocal();
  renderAll();
  initWheel();
  pushToRailway().then(() => {
    setAdminStatus('ok', 'Target user session scrubbed successfully.');
    populateRemoveSelect();
  });
}

function adminReset() {
  if (!adminUnlocked) return;
  if (!confirm("⚠️ This action deletes ALL database rows. Confirm?")) return;
  
  state.draws = [];
  state.locked = false;
  saveLocal();
  renderAll();
  initWheel();
  pushToRailway().then(() => {
    setAdminStatus('ok', 'Database wiped clean.');
    populateRemoveSelect();
  });
}

// Ensure init method cleans tracking variables on loop launch
(function init() {
  loadLocal();
  initWheel();     
  renderAll();     
  startPolling(); // Starts polling server variables automatically
